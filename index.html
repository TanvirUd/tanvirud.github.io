<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TanvirUd Protfolio</title>
  <link rel="stylesheet" href="assets/reset.css">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div id="background-image" class="background-light"></div>
  <div id="container" class="light">
    <div id="content">
      <!-- Header -->
      <section id="header-section">
        <div id="left-nav">
          <a class="toggle-theme light" href="">--- Tanvir Uddin</a>
        </div>
        <div id="right-nav">
          <div class="clickable-links">
            <a class="clickable-link toggle-language light" href="#"><img src="assets/icons/language_icon_217771.svg" class="light-image" alt="Change language"> EN</a>
            <a class="clickable-link toggle-theme light" href="#"><img src="assets/icons/sun_night_light_dark_moon_weather_icon_194353.svg" class="light-image" alt="Light and dark mode switcher"></a>
            <a class="clickable-link toggle-theme light" href="#about-me-section">À propos</a>
            <a class="clickable-link toggle-theme light" href="#projects-section">Mes projets</a>
            <a class="clickable-link toggle-theme light" href="#experiences-section">Mes expériences</a>
            <a class="clickable-link toggle-theme light" href="#contact-section">Contactez-moi</a>
          </div>
        </div>
      </section>

      <!-- Hero banner -->
      <section id="banner-section">
        <div><p>Hello! Moi c'est Tanvir <span class="surname">Uddin</span></p></div>
        <h1>Un Développeur Full-stack</h1>
        <h2>Passionné par tout ce qui touche à la technologie et au développement.</h2>
        <div class="clickable-links">
          <a class="clickable-link light" href="https://github.com/TanvirUd" target="_blank" rel="noopener noreferrer"><img src="assets/icons/github_logo_icon_143772.svg" class="light-image" alt="Github icon"></a>
          <a class="clickable-link light" href="https://www.linkedin.com/in/tanvir-uddin-2000/" target="_blank" rel="noopener noreferrer"><img src="assets/icons/linkedin_icon-icons.com_65439.svg" class="light-image" alt="LikedIn icon"></a>
          <a class="clickable-link light" href="/files/TanvirUddinCV.pdf" target="_blank" rel="noopener noreferrer"><img src="assets/icons/resume_business_cv_work_job_curriculum_icon_175611.svg" class="light-image" alt="CV icon"></a>
        </div>
        <div id="techstacks">
          <div class="techstack"><p>PHP</p></div>
          <div class="techstack"><p>JavaScript</p></div>
        </div>
      </section>

      <!-- About me -->
      <section id="about-me-section">

      </section>

      <!-- Projects -->
      <section id="projects-section">

      </section>

      <!-- My experiences -->
      <section id="experiences-section">

      </section>

      <!-- Contact me -->
      <section id="contact-section">

      </section>

      <!--  -->
      <section id="footer-section">

      </section>
    </div>
  </div>

  <script>
    let isDarkMode = false;

    document.querySelector('.toggle-theme').addEventListener('click', function(e) {
      e.preventDefault();
      isDarkMode = !isDarkMode;

      const bgDiv = document.getElementById('background-image');
      if (bgDiv) {
        bgDiv.classList.toggle('background-light', !isDarkMode);
        bgDiv.classList.toggle('background-dark', isDarkMode);
      }

      const sepDiv = document.querySelector('#vertical-separator');
      if (sepDiv) {
        sepDiv.classList.toggle('light-separator', !isDarkMode);
        sepDiv.classList.toggle('dark-separator', isDarkMode);
      }

      document.querySelectorAll('.light, .dark').forEach(el => {
        el.classList.toggle('light', !isDarkMode);
        el.classList.toggle('dark', isDarkMode);
      });

      document.querySelectorAll('.light-image, .dark-image').forEach(img => {
        img.classList.toggle('light-image', !isDarkMode);
        img.classList.toggle('dark-image', isDarkMode);
      });
    });

    document.querySelector('.toggle-language').addEventListener('click', function(e) {
      e.preventDefault();
      const frElements = document.querySelectorAll('.fr');
      const enElements = document.querySelectorAll('.en');
      const isCurrentlyFr = frElements[0].style.display !== 'none';

      frElements.forEach(el => el.style.display = isCurrentlyFr ? 'none' : '');
      enElements.forEach(el => el.style.display = isCurrentlyFr ? '' : 'none');

      this.lastChild.textContent = isCurrentlyFr ? ' FR' : ' EN';
    });
  </script>
</body>
</html>
